[release]
version = "0.4.0"
policy = "independent"

[crates."eth-valkyoth-codec"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Adds stable decode and resource-exhaustion error categories, codes, and formatting."

[crates."eth-valkyoth-primitives"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Adds constant-time Address equality, typed-envelope TryFrom semantics, and B256 hash-map timing documentation."

[crates."eth-valkyoth-protocol"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Adds stable protocol, feature, fork, and state error categories, codes, and formatting."

[crates."eth-valkyoth-verify"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Adds stable verification error categories, codes, and formatting."

[crates."eth-valkyoth-derive"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Requires explicit non-secret reasons for skipped sanitization fields."

[crates."eth-valkyoth-sanitization"]
previous_version = "0.3.0"
version = "0.4.0"
change = "code"
publish = true
reason = "Moves best-effort clearing helpers into an explicit best_effort module."

[crates."eth-valkyoth-evm"]
