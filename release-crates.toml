[release]
version = "0.5.0"
policy = "independent"

[crates."eth-valkyoth-codec"]
previous_version = "0.4.0"
version = "0.5.0"
change = "code"
publish = true
reason = "Adds mandatory proof-node and cumulative item budgets plus checked length and offset helpers."

[crates."eth-valkyoth-primitives"]
previous_version = "0.4.0"
version = "0.5.0"
change = "code"
publish = true
reason = "Adds non-exhaustive primitive errors, transaction type TryFrom documentation, and Address hash timing documentation."

[crates."eth-valkyoth-protocol"]
previous_version = "0.4.0"
version = "0.5.0"
change = "code"
publish = true
reason = "Marks protocol error enums non-exhaustive and removes the dead-code typestate entry point from normal builds."

[crates."eth-valkyoth-verify"]
previous_version = "0.4.0"
