# eth dependency policy.
#
# eth is an EUPL-1.2 project. Dependencies are admitted deliberately because
# Ethereum protocol crates are security-sensitive and often sit on untrusted
# network, RPC, or signing boundaries.

[graph]
all-features = true

[licenses]
confidence-threshold = 0.95
include-dev = true
include-build = true
unused-allowed-license = "allow"
unused-license-exception = "deny"

allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "EUPL-1.2",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Zlib",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"

[advisories]
db-path = ".cargo-deny-advisory-dbs"
yanked = "deny"
# cargo-deny advisory class scopes use all/workspace/transitive/none.
# "all" fails the check for every matching advisory in the dependency graph.
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
