name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release metadata
        run: scripts/validate-release-metadata.sh
